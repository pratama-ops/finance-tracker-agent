<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Agent | Private Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #121212;
            --accent-gold: #C9A84C;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --border-color: #2a2a2a;
            --gold-light: #d4b96a;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }

        /* Typography */
        h1,
        h2,
        .card-label {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.8rem;
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* Buttons */
        .btn-gold {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .btn-gold:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid rgba(201, 168, 76, 0.2);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--accent-gold);
        }

        .card-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .card-value {
            font-size: 2.2rem;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
        }

        /* Chat/Input Area */
        .input-area {
            background: var(--surface-color);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #userInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: #fff;
            padding: 0.5rem;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            transition: border 0.3s;
        }

        #userInput:focus {
            border-bottom: 1px solid var(--accent-gold);
        }

        #agentStatus {
            font-size: 0.85rem;
            color: var(--accent-gold);
            font-style: italic;
        }

        /* Table */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #1a1a1a;
        }

        tr:hover {
            background: rgba(201, 168, 76, 0.03);
        }

        #emptyState {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            border: 1px dashed var(--border-color);
            margin-top: 1rem;
        }

        .tx-count-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .logo {
                font-size: 1.3rem;
            }

            .summary-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .card {
                padding: 1.2rem;
            }

            .card-value {
                font-size: 1.6rem;
            }

            .input-area {
                padding: 1rem;
            }

            #userInput {
                font-size: 1rem;
            }

            /* tabel scroll horizontal di HP */
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 500px;
            }

            th,
            td {
                padding: 0.8rem 0.6rem;
                font-size: 0.8rem;
            }

            #emptyState {
                padding: 2rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .logo {
                font-size: 1.1rem;
            }

            .btn-gold {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .card-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">FINANCE AGENT</div>
        <button id="btnExport" class="btn-gold">Export CSV</button>
    </header>

    <main>
        <section class="summary-grid">
            <div class="card">
                <span class="card-label">Pemasukan</span>
                <div id="totalIncome" class="card-value">Rp 0</div>
            </div>
            <div class="card">
                <span class="card-label">Pengeluaran</span>
                <div id="totalExpense" class="card-value">Rp 0</div>
            </div>
            <div class="card">
                <span class="card-label">Saldo</span>
                <div id="totalBalance" class="card-value">Rp 0</div>
            </div>
        </section>

        <section class="input-area">
            <input type="text" id="userInput" placeholder="Contoh: Beli kopi 50000...">
            <button id="btnSend" class="btn-gold">Kirim Instruksi</button>
            <div id="agentStatus">Status: Siap melayani</div>
        </section>

        <section class="transactions">
            <div id="txCount" class="tx-count-label">Menampilkan 0 transaksi</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Deskripsi</th>
                            <th>Kategori</th>
                            <th>Tipe</th>
                            <th>Jumlah</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="txBody">
                    </tbody>
                </table>
            </div>
            <div id="emptyState">
                Belum ada transaksi. Silakan input perintah di atas.
            </div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>

</html>
